---
name: Publish Docker image

# TODO: currently pushes to registry on every push.
# But it is preferrable to run on releases
# on:
#   release:
#     types:
#       [published]
"on":
  push:
    branches: [main]
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Github Image Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/opendebate-api
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
      - name: Generate artifact attestation
        if: ${{ !env.ACT }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/opendebate-api
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  bump-manifest:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    env:
      K8S_REPO: Ukrainian-Debate-Dev-Community/opendebate-k8s
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.K8S_REPO }}
          token: ${{ secrets.K8S_REPO_TOKEN }}

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Bump image tag
        id: bump
        run: |
          SHORT_SHA="$(echo ${{ github.sha }} | cut -c1-7)"
          IMAGE="ghcr.io/ukrainian-debate-dev-community/opendebate-api"
          cd apps/api
          kustomize edit set image "${IMAGE}=${IMAGE}:sha-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Open signed PR with image bump
        env:
          GH_TOKEN: ${{ secrets.K8S_REPO_TOKEN }}
          SHORT_SHA: ${{ steps.bump.outputs.short_sha }}
        run: |
          set -euo pipefail

          BRANCH="bot/bump-api-${SHORT_SHA}"
          MSG="chore(api): bump image to sha-${SHORT_SHA}"
          PATH_IN_REPO="apps/api/kustomization.yaml"

          # No-op if the file didn't actually change (e.g. retry after merge)
          if git -C . diff --quiet -- "${PATH_IN_REPO}"; then
            echo "No manifest change — skipping PR."
            exit 0
          fi

          BASE_OID=$(gh api "repos/${K8S_REPO}/git/refs/heads/main" --jq .object.sha)

          # Recreate branch (delete if leftover from a prior failed attempt;
          # closes any stale PR for the same SHA).
          gh api "repos/${K8S_REPO}/git/refs/heads/${BRANCH}" -X DELETE 2>/dev/null || true
          gh api "repos/${K8S_REPO}/git/refs" \
            --method POST \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="${BASE_OID}"

          # Commit via GraphQL createCommitOnBranch — produces a GitHub-signed
          # (verified) commit, satisfying the required_signatures rule without
          # managing GPG/SSH keys in CI.
          CONTENT_B64=$(base64 -w0 "${PATH_IN_REPO}")
          jq -n \
            --arg repo   "${K8S_REPO}" \
            --arg branch "${BRANCH}" \
            --arg oid    "${BASE_OID}" \
            --arg path   "${PATH_IN_REPO}" \
            --arg content "${CONTENT_B64}" \
            --arg msg    "${MSG}" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $msg },
                  fileChanges: { additions: [{ path: $path, contents: $content }] },
                  expectedHeadOid: $oid
                }
              }
            }' \
          | gh api graphql --input -

          gh pr create -R "${K8S_REPO}" \
            --base main \
            --head "${BRANCH}" \
            --title "${MSG}" \
            --body "Automated image bump from opendebate-dev@${GITHUB_SHA}"
