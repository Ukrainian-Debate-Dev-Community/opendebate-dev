---
name: Validate

"on":
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0

      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - uses: docker/setup-buildx-action@v4

      - name: Docker build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
